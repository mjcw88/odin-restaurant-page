<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: Restaurant Page | The Odin Project</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header id="header">
        <div class="name-header-container">
            <div class="name-header">
                <svg viewBox="0 0 300 212" class="name-arch" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <path id="arch" d="M 20,180 A 130,130 0 0,1 280,180" />
                    </defs>
                    <rect x="0" y="0" width="300" height="130" rx="4" />
                    <text>
                        <textPath href="#arch" startOffset="50%" text-anchor="middle">No Bull</textPath>
                    </text>
                    <text x="150" y="210" text-anchor="middle" font-size="0.9em">Burgers</text>
                </svg>
                <img src="images/cute-cow-burger-cartoon-vector-icon-illustration-animal-food-icon-isolated-flat-vector.png" alt="Smiling Cow" id="cow-logo">
            </div>
        </div>
        <nav>
            <button id="home-btn">Home</button>
            <button id="menu-btn">Menu</button>
            <button id="contact-btn">Contact</button>
        </nav>
    </header>
    <div id="content">
    </div>
</body>
</html>
